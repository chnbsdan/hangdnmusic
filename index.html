<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <link rel="icon" href="https://pan.hangdn.com/raw/ico/map64.ico" type="image/ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .main-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 40px; /* 向下移动 */
        }
        
        .content-area {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .player-area {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }
        
        .btn-bar {
            background: rgba(248,248,248,0.9);
            border-bottom: 1px solid rgba(238,238,238,0.8);
            padding: 15px 20px;
        }
        
        .btn-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            color: #666;
        }
        
        .btn:hover, .btn.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border-color: #4CAF50;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .data-area {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .data-box {
            display: none;
        }
        
        .data-box.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .search-container {
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .search-input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .random-search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        
        .random-search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }
        
        .music-list {
            width: 100%;
        }
        
        .music-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(240,240,240,0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        
        .music-item:hover {
            background: linear-gradient(135deg, #f5fff5, #ecffec);
            transform: translateX(5px);
        }
        
        .music-item.active {
            background: linear-gradient(135deg, #d0ffd0, #b8ffb8);
            color: #4CAF50;
            border-left: 4px solid #4CAF50;
        }
        
        .music-index {
            width: 25px;
            text-align: center;
            color: #999;
            font-weight: bold;
            font-size: 12px;
        }
        
        .music-info {
            flex: 1;
            min-width: 0;
        }
        
        .music-name {
            font-size: 14px;
            margin-bottom: 3px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .music-artist {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .music-duration {
            color: #999;
            font-size: 11px;
            margin-right: 8px;
        }
        
        .download-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }
        
        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        
        .favorite-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.3);
            margin-right: 5px;
        }
        
        .favorite-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
        }
        
        .favorite-btn.active {
            background: linear-gradient(135deg, #FF5722, #E64A19);
        }
        
        .player-content {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .cover {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.5s ease;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(76, 175, 80, 0.1);
        }
        
        .cover.playing {
            animation: rotateCover 20s linear infinite;
        }
        
        @keyframes rotateCover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .music-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
        }
        
        .default-cover {
            width: 120px;
            height: 120px;
            opacity: 0.7;
            border-radius: 50%;
        }
        
        .cover-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-size: 12px;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 15px;
            display: none;
            z-index: 2;
        }
        
        .player-controls {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .player-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .player-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .download-main-btn, .favorite-main-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 140px;
        }
        
        .download-main-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .download-main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .favorite-main-btn {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }
        
        .favorite-main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
        
        .lyric-container {
            margin-top: 20px;
            background: rgba(248,248,248,0.8);
            border-radius: 12px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            flex: 1;
            position: relative;
        }

        .lyric-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4CAF50;
            text-align: center;
        }

        .lyric-content {
            text-align: center;
            line-height: 1.8;
            font-size: 12px;
            color: #666;
            transition: all 0.3s ease;
            min-height: 100%;
        }

        .lyric-line {
            padding: 8px 0;
            transition: all 0.3s ease;
            min-height: 24px;
            opacity: 0.7;
        }

        .lyric-line.active {
            color: #4CAF50;
            font-weight: bold;
            font-size: 14px;
            transform: scale(1.05);
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
            opacity: 1;
        }

        .lyric-line.past {
            color: #999;
            font-size: 11px;
            transform: scale(0.95);
            opacity: 0.5;
        }

        .lyric-line.future {
            color: #666;
            font-size: 12px;
            opacity: 0.7;
        }

        .lyric-container::-webkit-scrollbar {
            width: 4px;
        }

        .lyric-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
        }

        .lyric-container::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 2px;
        }
        
        #music-info {
            margin: 15px 0;
            font-size: 13px;
            color: #666;
            padding: 10px;
            background: rgba(248,248,248,0.8);
            border-radius: 8px;
            font-weight: 500;
        }
        
        /* 移除底部播放控制栏 */
        .footer {
            display: none;
        }
        
        /* 新增：播放器卡片内的进度控制区域 */
        .player-progress-controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(248,248,248,0.8);
            border-radius: 12px;
        }
        
        .player-progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .player-time-display {
            font-size: 11px;
            color: #666;
            min-width: 35px;
        }
        
        .player-progress-box {
            flex: 1;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .player-progress-box:hover {
            height: 6px;
        }
        
        .player-music-progress {
            position: absolute;
            height: 100%;
            background: #4CAF50;
            border-radius: 2px;
            transition: width 0.1s ease;
            width: 0%;
        }
        
        .player-progress-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.8);
        }
        
        .player-progress-box:hover .player-progress-handle {
            opacity: 1;
        }
        
        .player-time-tooltip {
            position: absolute;
            top: -25px;
            font-size: 11px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            transform: translateX(-50%);
            display: none;
            z-index: 10;
        }
        
        .player-additional-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-volume-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            color: #4CAF50;
            font-size: 12px;
        }
        
        .player-volume-btn:hover {
            background: rgba(76, 175, 80, 0.2);
        }
        
        .player-volume-box {
            width: 80px;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .player-volume-box:hover {
            height: 6px;
        }
        
        .player-volume-progress {
            position: absolute;
            height: 100%;
            background: #4CAF50;
            border-radius: 2px;
            transition: width 0.1s ease;
            width: 70%;
        }
        
        .player-mode-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            color: #4CAF50;
            font-size: 12px;
        }
        
        .player-mode-btn:hover {
            background: rgba(76, 175, 80, 0.2);
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
        
        .error {
            text-align: center;
            padding: 20px;
            color: #f44336;
            background: #ffebee;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
        }
        
        .search-example {
            margin-top: 10px;
            color: #888;
            font-size: 12px;
            text-align: center;
        }
        
        .search-example span {
            color: #4CAF50;
            cursor: pointer;
            margin: 0 4px;
            text-decoration: underline;
            transition: all 0.3s ease;
        }
        
        .search-example span:hover {
            color: #45a049;
        }
        
        .random-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }
        
        .random-keyword {
            padding: 6px 12px;
            background: rgba(33, 150, 243, 0.1);
            color: #2196F3;
            border: 1px solid #2196F3;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
        }
        
        .random-keyword:hover {
            background: #2196F3;
            color: white;
            transform: translateY(-2px);
        }
        
        .quality-selector {
            margin: 10px 0;
            text-align: center;
        }
        
        .quality-btn {
            padding: 6px 12px;
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            margin: 0 3px;
            transition: all 0.3s ease;
        }
        
        .quality-btn.active {
            background: #4CAF50;
            color: white;
        }
        
        .message-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 14px;
            animation: fadeInOut 2s ease;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .player-area {
                order: -1;
            }
        }
        
        /* 右键菜单样式 */
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 8px 0;
            z-index: 10000;
            min-width: 180px;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .context-menu-item:hover {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }
        
        .context-menu-divider {
            height: 1px;
            background: rgba(0,0,0,0.1);
            margin: 5px 0;
        }
        
        .support-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .support-info:hover {
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="content-area">
            <div class="btn-bar">
                <div class="btn-box">
                    <span class="btn" data-tab="playing">正在播放</span>
                    <span class="btn" data-tab="sheet">播放列表</span>
                    <span class="btn active" data-tab="search">歌曲搜索</span>
                    <span class="btn" data-tab="favorites">我的收藏</span>
                    <span class="btn" onclick="showMessage('下载说明：点击歌曲旁边的下载按钮即可下载MP3文件')">下载说明</span>
                    <span class="btn" onclick="showMessage('免责声明：本平台仅提供音乐搜索服务，版权归原作者所有')">免责声明</span>
                </div>
            </div>
            
            <div class="data-area">
                <div id="search" class="data-box active">
                    <div class="search-container">
                        <div class="search-box">
                            <input type="text" class="search-input" id="searchInput" placeholder="输入歌曲名、歌手名或专辑名...">
                            <button class="search-btn" id="searchButton">搜索</button>
                            <button class="random-search-btn" id="randomSearchButton">🎲 随机推荐100首</button>
                        </div>
                        <div class="quality-selector">
                            <span class="quality-btn active" data-quality="standard">标准音质</span>
                            <span class="quality-btn" data-quality="high">高品质</span>
                            <span class="quality-btn" data-quality="lossless">无损音质</span>
                        </div>
                        <div class="search-example">
                            试试搜索: 
                            <span onclick="quickSearch('周杰伦')">周杰伦</span>
                            <span onclick="quickSearch('林俊杰')">林俊杰</span>
                            <span onclick="quickSearch('邓紫棋')">邓紫棋</span>
                            <span onclick="quickSearch('起风了')">起风了</span>
                        </div>
                        <div class="random-keywords">
                            <div class="random-keyword" onclick="quickSearch('流行')">流行</div>
                            <div class="random-keyword" onclick="quickSearch('摇滚')">摇滚</div>
                            <div class="random-keyword" onclick="quickSearch('民谣')">民谣</div>
                            <div class="random-keyword" onclick="quickSearch('电子')">电子</div>
                            <div class="random-keyword" onclick="quickSearch('古典')">古典</div>
                            <div class="random-keyword" onclick="quickSearch('爵士')">爵士</div>
                            <div class="random-keyword" onclick="quickSearch('轻音乐')">轻音乐</div>
                            <div class="random-keyword" onclick="quickSearch('华语')">华语</div>
                            <div class="random-keyword" onclick="quickSearch('欧美')">欧美</div>
                            <div class="random-keyword" onclick="quickSearch('日韩')">日韩</div>
                        </div>
                    </div>
                    <div class="music-list" id="searchResults">
                        <div class="loading">请输入关键词搜索歌曲，或点击"随机推荐100首"按钮发现新音乐</div>
                    </div>
                </div>
                
                <div id="playing" class="data-box">
                    <div class="music-list" id="playingList">
                        <div class="loading">暂无播放记录</div>
                    </div>
                </div>
                
                <div id="sheet" class="data-box">
                    <div class="music-list" id="sheetList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                
                // 检查是否在音乐列表项上右键
                if (e.target.closest('.music-item')) {
                    contextMenuTarget = e.target.closest('.music-item');
                    const index = Array.from(contextMenuTarget.parentNode.children).indexOf(contextMenuTarget);
                    contextMenuSong = currentState.searchResults[index];
                } else if (e.target.closest('.player-content')) {
                    contextMenuTarget = 'player';
                    contextMenuSong = currentState.currentSong;
                } else {
                    // 全屏右键菜单
                    contextMenuTarget = 'global';
                    contextMenuSong = null;

                showContextMenu(e);

                    showMessage('已添加到播放列表');

                        const songName = contextMenuSong.name || contextMenuSong.title;
                        const artist = contextMenuSong.artists ? 
                            (Array.isArray(contextMenuSong.artists) ? contextMenuSong.artists[0].name : contextMenuSong.artists) : '未知歌手';

        // 初始化API

            currentState.currentAPI = await getAvailableAPI();

        async function getAvailableAPI() {
            for (const api of API_BASES) {
                try {
                    console.log(`测试API: ${api}`);
                    const testUrl = api.includes('meting') ? 
                        `${api}?type=search&id=周杰伦` :

                    const response = await fetch(testUrl, {
                        method: 'GET',

                    if (response.ok) {
                        const data = await response.json();
                        // 检查响应数据格式
                        if ((data.code === 200 || data.data) && (data.result || data.data)) {
                            console.log(`API ${api} 可用`);
                            return api;
                        }

                } catch (error) {
                    console.log(`API ${api} 不可用:`, error.message);

        // 快速搜索
        function quickSearch(keyword) {
            document.getElementById('searchInput').value = keyword;

        // 随机搜索音乐
        async function randomSearchMusic() {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="loading">🎲 正在随机推荐100首热门歌曲...</div>';
            
            const randomKeyword = randomKeywords[Math.floor(Math.random() * randomKeywords.length)];
            document.getElementById('searchInput').value = randomKeyword;
            
            try {
                const api = currentState.currentAPI || await getAvailableAPI();
                if (!api) {
                    throw new Error('搜索服务暂时不可用');
                }
                
                const searchUrl = api.includes('meting') ? 
                    `${api}?type=search&id=${encodeURIComponent(randomKeyword)}` :
                    `${api}/search?keywords=${encodeURIComponent(randomKeyword)}&limit=100`;
                
                const response = await fetch(searchUrl);
                const data = await response.json();

                // 处理不同的API响应格式
                let songs = [];
                if (data.code === 200 && data.result && data.result.songs) {
                    songs = data.result.songs;
                } else if (data.data) {
                    songs = data.data;
                }
                
                if (songs && songs.length > 0) {
                    currentState.searchResults = songs;
                    displaySearchResults(songs);
                } else {
                    resultsDiv.innerHTML = '<div class="error">随机推荐失败，请重试</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<div class="error">随机推荐失败: ' + error.message + '</div>';

        }

        // 搜索音乐
        async function searchMusic() {
            const keyword = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            
            if (!keyword) {
                showMessage('请输入搜索关键词');
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">搜索中... "' + keyword + '"</div>';

            try {
                const api = currentState.currentAPI || await getAvailableAPI();
                if (!api) {
                    throw new Error('搜索服务暂时不可用');
                }
                
                const searchUrl = api.includes('meting') ? 
                    `${api}?type=search&id=${encodeURIComponent(keyword)}` :
                    `${api}/search?keywords=${encodeURIComponent(keyword)}&limit=50`;
                
                const response = await fetch(searchUrl);
                const data = await response.json();

                // 处理不同的API响应格式
                let songs = [];
                if (data.code === 200 && data.result && data.result.songs) {
                    songs = data.result.songs;
                } else if (data.data) {
                    songs = data.data;
                }
                
                if (songs && songs.length > 0) {
                    currentState.searchResults = songs;
                    displaySearchResults(songs);
                } else {
                    throw new Error(data.msg || '搜索失败');

            } catch (error) {
                resultsDiv.innerHTML = '<div class="error">搜索失败: ' + error.message + '</div>';

        // 显示搜索结果
        function displaySearchResults(songs) {
            const resultsDiv = document.getElementById('searchResults');
            
            if (!songs || songs.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">未找到相关歌曲</div>';

            }

            let html = '';
            songs.forEach((song, index) => {
                // 处理不同的歌曲数据格式
                const songName = song.name || song.title || '未知歌曲';
                const artists = song.artists ? 
                    (Array.isArray(song.artists) ? song.artists.map(a => a.name).join(' / ') : song.artists) : 
                    (song.artist || '未知歌手');
                const album = song.album ? (song.album.name || song.album) : '未知专辑';
                const duration = formatTime(song.duration || 0);
                const songId = song.id;
                const isFavorited = currentState.favorites.has(songId);
                
                html += `
                    <div class="music-item" onclick="playSong(${songId}, ${index})">
                        <div class="music-index">${index + 1}</div>
                        <div class="music-info">
                            <div class="music-name">${songName}</div>
                            <div class="music-artist">${artists} - ${album}</div>
                        </div>
                        <div class="music-duration">${duration}</div>
                        <button class="favorite-btn ${isFavorited ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${songId}, '${songName.replace(/'/g, "\\'")}', '${artists.replace(/'/g, "\\'")}')">
                            ${isFavorited ? '❤️' : '🤍'}

            resultsDiv.innerHTML = html;
        }

        // AI超强播放函数 - 终极解决方案
        async function playSong(songId, index) {
            try {
                console.log('AI超强播放开始:', songId);
                
                // 重置状态
                currentState.retryCount = 0;
                resetPlayerUI();
                
                // 获取歌曲信息
                const song = currentState.searchResults[index];
                if (!song) {
                    showMessage('歌曲信息获取失败');
                    return;
                }
                
                currentState.currentPlaylist = currentState.searchResults;
                currentState.currentIndex = index;
                currentState.currentSong = song;
                
                // 更新界面信息
                updateMusicInfo(song);
                updatePlayingList();
                
                // 并行加载封面和歌词
                await Promise.all([
                    loadMusicCover(song),
                    loadLyric(songId)
                ]);
                
                // 使用AI超强音频URL获取
                const audioUrl = await getSuperAudioUrl(songId);
                
                if (audioUrl) {
                    console.log('AI获取到可播放URL:', audioUrl);
                    await startAudioPlayback(audioUrl, song);
                } else {
                    console.log('AI无法获取可播放URL，尝试终极备用方案');
                    await tryUltimateBackup(songId, song, index);
                }
                
            } catch (error) {
                console.error('AI播放错误:', error);
                showMessage('播放出错: ' + error.message);
                setTimeout(() => {
                    playNext();
                }, 1500);
            }
        }

        // AI超强音频URL获取 - 终极解决方案
        async function getSuperAudioUrl(songId) {
            const quality = qualityMap[currentState.audioQuality];
            const api = currentState.currentAPI || await getAvailableAPI();
            
            if (!api) {
                console.log('所有API都不可用，使用备用方案');
                return await getBackupAudioUrl(songId);
            }

            // 尝试多种URL格式
            const endpoints = api.includes('meting') ? [
                `${api}?type=url&id=${songId}`,
                `https://music.163api.xyz/song/url?id=${songId}`,
                `https://music-api.heheda.top/song/url?id=${songId}`
            ] : [
                `${api}/song/url/v1?id=${songId}&level=${quality}`,
                `${api}/song/url?id=${songId}`,
                `${api}/song/url/v1?id=${songId}`,
                `https://api.injahow.cn/meting/?type=url&id=${songId}`,
                `https://music.163api.xyz/song/url?id=${songId}`
            ];

            // 使用Promise.any快速获取第一个成功的请求
            const promises = endpoints.map(async (endpoint, index) => {
                try {
                    console.log(`尝试端点 ${index + 1}:`, endpoint);
                    const response = await fetch(endpoint, {
                        signal: AbortSignal.timeout(5000)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    // 检查响应类型
                    const contentType = response.headers.get('content-type');
                    
                    // 如果是音频文件，直接返回URL
                    if (contentType && contentType.includes('audio/')) {
                        console.log('找到音频文件URL:', endpoint);
                        return endpoint;
                    }
                    
                    // 如果是JSON响应，解析数据
                    if (contentType && contentType.includes('application/json')) {
                        const data = await response.json();
                        
                        // 处理不同的API响应格式
                        let audioUrl = null;
                        if (data.data && data.data[0] && data.data[0].url) {
                            audioUrl = data.data[0].url;
                        } else if (data.url) {
                            audioUrl = data.url;
                        } else if (data.data && data.data.url) {
                            audioUrl = data.data.url;
                        }
                        
                        if (audioUrl && await verifyUrlAccessibility(audioUrl)) {
                            console.log('找到有效URL:', audioUrl);
                            return audioUrl;
                        }
                    }
                    
                    throw new Error('无效的音频URL');
                } catch (error) {
                    console.log(`端点 ${index + 1} 失败:`, error.message);
                    throw error;
                }
            });

            try {
                return await Promise.any(promises);
            } catch (error) {
                console.log('所有端点都失败，使用备用方案');
                return await getBackupAudioUrl(songId);
            }
        }

        // 验证URL可访问性
        async function verifyUrlAccessibility(url) {
            try {
                const response = await fetch(url, { 
                    method: 'HEAD',
                    signal: AbortSignal.timeout(3000)
                });
                return response.ok;
            } catch (error) {
                console.log('URL验证失败:', url, error.message);
                return false;
            }
        }

        // 备用音频源方案
        async function getBackupAudioUrl(songId) {
            // 方法1: 使用第三方音乐源
            const backupSources = [
                `https://music.163api.xyz/song/url?id=${songId}`,
                `https://api.injahow.cn/meting/?type=url&id=${songId}`,
                `https://music-api.heheda.top/song/url?id=${songId}`
            ];
            
            for (const source of backupSources) {
                try {
                    const response = await fetch(source);
                    const data = await response.json();
                    let audioUrl = null;
                    
                    if (data.data && data.data[0] && data.data[0].url) {
                        audioUrl = data.data[0].url;
                    } else if (data.url) {
                        audioUrl = data.url;
                    } else if (data.data && data.data.url) {
                        audioUrl = data.data.url;
                    }
                    
                    if (audioUrl && await verifyUrlAccessibility(audioUrl)) {
                        return audioUrl;
                    }
                } catch (error) {
                    console.log(`备用源 ${source} 失败:`, error.message);
                }
            }
            
            // 方法2: 使用音乐ID直接生成URL（适用于某些情况）
            const directUrls = [
                `http://music.163.com/song/media/outer/url?id=${songId}.mp3`,
                `https://api.mtnhao.com/song/url?id=${songId}`
            ];
            
            for (const url of directUrls) {
                if (await verifyUrlAccessibility(url)) {
                    return url;
                }
            }
            
            throw new Error('无法获取音频URL');
        }

        // 终极备用方案
        async function tryUltimateBackup(songId, song, index) {
            console.log('AI启动终极备用方案...');
            currentState.retryCount++;
            
            if (currentState.retryCount > currentState.maxRetries) {
                console.log('AI超过最大重试次数，跳转下一首');
                showMessage('播放失败，跳转到下一首');
                setTimeout(() => playNext(), 1000);
                return;
            }
            
            // 方案1: 尝试所有音质等级
            const qualities = ['standard', 'high', 'lossless'];
            for (const quality of qualities) {
                try {
                    const urlResponse = await fetch(`https://music-api.heheda.top/song/url/v1?id=${songId}&level=${qualityMap[quality]}`);
                    const urlData = await urlResponse.json();
                    
                    if (urlData.code === 200 && urlData.data && urlData.data[0] && urlData.data[0].url) {
                        const audioUrl = urlData.data[0].url;
                        await startAudioPlayback(audioUrl, song);
                        showMessage(`播放成功 (${quality}音质)`);
                        return;
                    }
                } catch (error) {
                    console.log(`AI音质 ${quality} 播放失败`);
                }
            }
            
            // 方案2: 尝试其他API服务器
            const backupServers = [
                'https://music-api.heheda.top',
                'https://api.injahow.cn/meting',
                'https://music.163api.xyz'
            ];
            
            for (const server of backupServers) {
                try {
                    const urlResponse = await fetch(`${server}/song/url/v1?id=${songId}&level=standard`);
                    const urlData = await urlResponse.json();
                    
                    if (urlData.code === 200 && urlData.data && urlData.data[0] && urlData.data[0].url) {
                        const audioUrl = urlData.data[0].url;
                        await startAudioPlayback(audioUrl, song);
                        showMessage(`播放成功 (备用服务器)`);
                        return;
                    }
                } catch (error) {
                    console.log(`备用服务器 ${server} 失败`);
                }
            }
            
            // 方案3: 使用代理方式
            try {
                const proxyUrl = await getBackupAudioUrl(songId);
                if (proxyUrl) {
                    await startAudioPlayback(proxyUrl, song);
                    showMessage('播放成功 (代理方式)');
                    return;
                }
            } catch (error) {
                console.log('代理方式失败:', error);
            }
            
            // 所有方案都失败，跳转下一首
            console.log('AI所有播放方案均失败，跳转下一首');
            showMessage('播放失败，跳转到下一首');
            setTimeout(() => playNext(), 1000);
        }

        // AI生成封面
        function generateAICover(text, subText) {
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = text.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            const hue = hash % 360;
            const saturation = 70 + (hash % 20);
            const lightness = 50 + (hash % 15);
            
            const svg = `
                <svg width="500" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                    <defs>
                        <linearGradient id="aiGrad${hash}" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="hsl(${hue}, ${saturation}%, ${lightness}%)" />
                            <stop offset="50%" stop-color="hsl(${hue + 30}, ${saturation}%, ${lightness - 10}%)" />
                            <stop offset="100%" stop-color="hsl(${hue + 60}, ${saturation}%, ${lightness - 5}%)" />
                        </linearGradient>
                    </defs>
                    
                    <circle cx="250" cy="250" r="240" fill="url(#aiGrad${hash})" />
                    
                    <text x="250" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">
                        ${text.substring(0, 8)}
                    </text>
                    <text x="250" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)" font-weight="500">
                        ${subText ? subText.substring(0, 12) : 'AI Music'}
                    </text>
                </svg>
            `;
            
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        }

        // 解析歌词
        function parseLyric(lyricText) {
            const lines = lyricText.split('\n');
            const lyricData = [];
            
            const timeRegex = /\[(\d+):(\d+)\.(\d+)\](.+)/;
            
            lines.forEach(line => {
                const match = line.match(timeRegex);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = parseInt(match[3]);
                    const text = match[4].trim();
                    
                    if (text && text !== '') {
                        const timeInSeconds = minutes * 60 + seconds + milliseconds / 1000;
                        lyricData.push({ time: timeInSeconds, text });
                    }
                }
            });
            
            lyricData.sort((a, b) => a.time - b.time);
            return lyricData;
        }

        // 显示歌词
        function displayLyric(lyricData) {
            const lyricContent = document.getElementById('lyricContent');
            
            if (lyricData.length === 0) {
                lyricContent.innerHTML = '<div class="lyric-line">暂无歌词</div>';
                return;
            }
            
            let html = '';
            lyricData.forEach((line, index) => {
                html += `<div class="lyric-line" data-time="${line.time}">${line.text}</div>`;
            });
            
            lyricContent.innerHTML = html;
        }

        // 更新歌词高亮和滚动
        function updateLyricHighlight(currentTime) {
            const lines = document.querySelectorAll('.lyric-line');
            if (lines.length === 0) return;
            
            let currentLineIndex = -1;
            
            for (let i = 0; i < lines.length; i++) {
                const lineTime = parseFloat(lines[i].getAttribute('data-time'));
                if (lineTime <= currentTime) {
                    currentLineIndex = i;
                }
            }
            
            lines.forEach((line, index) => {
                line.classList.remove('active', 'past', 'future');
                
                if (index < currentLineIndex) {
                    line.classList.add('past');
                } else if (index === currentLineIndex) {
                    line.classList.add('active');
                } else {
                    line.classList.add('future');
                }
            });
            
            if (currentLineIndex >= 0) {
                const activeLine = lines[currentLineIndex];
                const lyricContainer = document.querySelector('.lyric-container');
                
                if (activeLine && lyricContainer) {
                    const containerHeight = lyricContainer.clientHeight;
                    const lineOffset = activeLine.offsetTop;
                    const lineHeight = activeLine.offsetHeight;
                    
                    const targetScrollTop = lineOffset - (containerHeight / 2) + (lineHeight / 2);
                    
                    lyricContainer.scrollTo({
                        top: targetScrollTop,
                        behavior: 'smooth'
                    });
                }
            }
        }

        // 下载歌曲 - AI超强修复版
        async function downloadSong(songId, songName, retryCount = 0) {
            const maxRetries = 2;
            
            try {
                showMessage(`开始准备下载: ${songName}`);
                
                // 使用最可靠的下载API
                const downloadUrl = `https://api.injahow.cn/meting/?type=url&id=${songId}`;
                
                console.log('下载请求URL:', downloadUrl);
                
                // 直接使用下载URL，不进行JSON解析
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${songName}.mp3`;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                showMessage(`下载任务已开始: ${songName}`);
                
            } catch (error) {
                console.error(`下载失败 (尝试次数: ${retryCount + 1}):`, error);
                
                if (retryCount < maxRetries) {
                    showMessage(`下载失败，正在重试... (${retryCount + 1}/${maxRetries})`);
                    setTimeout(() => downloadSong(songId, songName, retryCount + 1), 1000 * (retryCount + 1));
                } else {
                    let errorMsg = '下载失败，请稍后重试';
                    if (error.message.includes('网络') || error.message.includes('Failed')) {
                        errorMsg = '网络连接不稳定，请检查您的网络后重试';
                    }
                    showMessage(errorMsg);
                }
            }
        }

        }

        function playNext() {
            if (currentState.currentPlaylist.length === 0) return;
            let newIndex = currentState.currentIndex + 1;
            if (newIndex >= currentState.currentPlaylist.length) newIndex = 0;
            const song = currentState.currentPlaylist[newIndex];
            playSong(song.id, newIndex);
        }

        function changeMode() {
            const modes = ['listloop', 'singlecycle', 'listrandom'];
            const currentModeIndex = modes.indexOf(currentState.playMode);
            const nextModeIndex = (currentModeIndex + 1) % modes.length;
            currentState.playMode = modes[nextModeIndex];
            
            const modeNames = {
                'listloop': '列表循环',
                'singlecycle': '单曲循环',
                'listrandom': '随机播放'
            };
            
            showMessage(`播放模式已切换为: ${modeNames[currentState.playMode]}`);
        }

        function toggleMute() {
            currentAudio.muted = !currentAudio.muted;
        }

        function updateMusicInfo(song) {
            const songName = song.name || song.title;
            const artists = song.artists ? 
                (Array.isArray(song.artists) ? song.artists.map(a => a.name).join(' / ') : song.artists) : 
                '未知歌手';
            document.getElementById('musicInfo').textContent = `${songName} - ${artists}`;
        }

        function updatePlayingList() {
            const playingList = document.getElementById('playingList');
            if (currentState.currentPlaylist.length === 0) return;
            
            let html = '';
            currentState.currentPlaylist.forEach((song, index) => {
                const songName = song.name || song.title;
                const artists = song.artists ? 
                    (Array.isArray(song.artists) ? song.artists.map(a => a.name).join(' / ') : song.artists) : 
                    '未知歌手';
                const duration = formatTime(song.duration || 0);
                const activeClass = index === currentState.currentIndex ? 'active' : '';
                const isFavorited = currentState.favorites.has(song.id);
                
                html += `
                    <div class="music-item ${activeClass}" onclick="playSong(${song.id}, ${index})">
                        <div class="music-index">${index + 1}</div>
                        <div class="music-info">
                            <div class="music-name">${songName}</div>
                            <div class="music-artist">${artists}</div>
                        </div>
                        <div class="music-duration">${duration}</div>
                        <button class="favorite-btn ${isFavorited ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${song.id}, '${songName.replace(/'/g, "\\'")}', '${artists.replace(/'/g, "\\'")}')">
                            ${isFavorited ? '❤️' : '🤍'}
                        </button>
                        <button class="download-btn" onclick="event.stopPropagation(); downloadSong(${song.id}, '${songName.replace(/'/g, "\\'")}')">下载</button>
                    </div>
                `;
            });
            
            playingList.innerHTML = html;
        }

        // 格式化时间
        function formatTime(milliseconds) {
            if (!milliseconds || isNaN(milliseconds)) return '0:00';
            
            const totalSeconds = Math.floor(milliseconds / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
